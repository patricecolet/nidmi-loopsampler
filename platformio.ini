; nidmi-loopsampler : sampler + loopstation audio via nidmi-core
; Cible : XIAO ESP32-S3 uniquement (PSRAM + SDMMC requis — C3 inapte)

[platformio]
default_envs = xiao-esp32s3

[env]
framework = arduino
monitor_speed = 115200
extra_scripts =
  pre:${PROJECT_DIR}/../nidmi-core/scripts/pio_osc_disable_bluetooth_slip.py
lib_extra_dirs =
  ${PROJECT_DIR}/../nidmi-core
lib_deps =
  fortyseveneffects/MIDI Library@5.0.2
  AppleMIDI
  cnmat/OSC@1.0.0
  ESP Async WebServer
  AsyncTCP
  sparkfun/SparkFun WM8960 Arduino Library

[env:xiao-esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
; PSRAM OPI activé (8MB intégré sur XIAO S3)
board_build.arduino.memory_type = qio_opi
build_flags =
  -DBOARD_HAS_PSRAM
  -DCONFIG_SPIRAM_CACHE_WORKAROUND
